name: Build AdGuard Filter

on:
  schedule:
    - cron: '0 18 * * *' # 毎日日本時間午前3時に自動ビルド
  workflow_dispatch:
  push:
    paths:
      - 'uBlockorigin.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js (for AdGuard Compiler)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Preprocessing Script
        run: python scripts/convert_to_adguard.py

      - name: Install AdGuard Hostlist Compiler
        run: npm install -g @adguard/hostlist-compiler

      - name: Create Compiler Config
        run: |
          cat <<EOF > compiler-config.json
          {
            "name": "uB-filter-by-kdroidwin (AdGuard Compatible)",
            "description": "Fully converted AdGuard syntax filter list automatically built from Kdroidwin's repository.",
            "homepage": "https://github.com/Kdroidwin/uB-filter-by-kdroidwin",
            "sources": [
              {
                "source": "adguard_temp.txt",
                "type": "adblock"
              }
            ],
            "transformations": [
              "Deduplicate",
              "Compress"
            ]
          }
          EOF

      - name: Compile Final AdGuard Filter
        run: hostlist-compiler -c compiler-config.json -o adguard.txt

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add adguard.txt
          git commit -m "auto-build: update AdGuard filter list" || exit 0
          git push
