name: Sync and Convert uB-filter-by-kdroidwin

on:
  schedule:
    # サーバー負荷分散のため0分を避けて15分に設定 (JST 12:15, 18:15, 0:15, 6:15)
    - cron: '15 3,9,15,21 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create dist directory
        run: mkdir -p dist

      # scripts/ フォルダ内の convert.py を実行
      - name: Run Conversion Script
        run: python scripts/convert.py

      - name: Commit and Push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: uB-filter-by-kdroidwin (AdGuard Optimized)"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
